<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa FIFA 2026 - Gerenciador do Álbum</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#009c3b">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen text-slate-800 flex flex-col">

    <!-- Navbar -->
    <nav id="main-nav" class="sticky top-0 z-50 print-hide border-b border-yellow-600 bg-[#FFDF00] shadow-md">
        <div class="max-w-6xl mx-auto p-4 flex justify-between items-center">
            <div class="flex items-center gap-2 sm:gap-4">
                <img src="https://digitalhub.fifa.com/transform/157d23bf-7e13-4d7b-949e-5d27d340987e/WC26_Logo?&io=transform:fill,height:210&quality=75" alt="2026 FIFA World Cup" class="h-8 sm:h-10 object-contain drop-shadow-md bg-transparent p-1 rounded">
                <h1 class="text-lg sm:text-xl font-bold tracking-tight text-slate-800 hidden sm:block">Copa FIFA 2026 - Gerenciador do Álbum</h1>
            </div>
            
            <!-- Controls Navbar (Shown when logged in) -->
            <div id="nav-controls" class="flex items-center gap-3 hidden">
                <span class="text-sm text-slate-500 hidden md:inline">Olá, <strong id="nav-username" class="text-slate-800"></strong></span>
                
                <button id="btn-admin-nav" onclick="showScreen('admin')" class="bg-[#002776] hover:bg-[#001A52] text-white px-2 sm:px-3 py-1.5 rounded font-medium text-xs hidden">Admin</button>
                <button onclick="window.print()" class="bg-[#002776] hover:bg-[#001A52] text-white px-2 sm:px-3 py-1.5 rounded font-medium text-xs flex items-center gap-1">Imprimir</button>
                <button onclick="showChangePassword()" class="bg-[#002776] hover:bg-[#001A52] text-white px-2 sm:px-3 py-1.5 rounded font-medium text-xs">Senha</button>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-white px-2 sm:px-3 py-1.5 rounded font-medium text-xs">Sair</button>
            </div>
        </div>
    </nav>

    <!-- VIEW: LOGIN / REGISTER -->
    <main id="view-auth" class="flex-grow flex items-center justify-center p-4">
        <div class="glass-panel bg-[#FFDF00] w-full max-w-md p-6 sm:p-8 rounded-xl border-2 border-yellow-500 shadow-xl">
            <div class="text-center mb-8">
                <img src="https://digitalhub.fifa.com/transform/157d23bf-7e13-4d7b-949e-5d27d340987e/WC26_Logo?&io=transform:fill,height:210&quality=75" alt="2026 FIFA World Cup" class="h-24 mx-auto mb-4 object-contain drop-shadow-md">
                <h2 class="text-3xl font-black mb-2 text-[#002776]">Acessar Álbum</h2>
                <p class="text-slate-800 font-semibold">Faça login para gerenciar sua coleção</p>
            </div>
            
            <form id="auth-form" onsubmit="handleAuth(event)" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-bold text-[#002776] mb-1">Login</label>
                    <input type="text" id="auth-username" maxlength="10" required class="w-full bg-white border-2 border-yellow-600 rounded-lg px-4 py-2.5 text-slate-900 font-bold focus:outline-none focus:border-[#002776] focus:ring-2 focus:ring-[#002776]/50" placeholder="Máx 10 caracteres">
                </div>
                <div>
                    <label class="block text-sm font-bold text-[#002776] mb-1">Senha</label>
                    <input type="password" id="auth-password" minlength="8" required class="w-full bg-white border-2 border-yellow-600 rounded-lg px-4 py-2.5 text-slate-900 font-bold focus:outline-none focus:border-[#002776] focus:ring-2 focus:ring-[#002776]/50" placeholder="Mínimo 8 caracteres">
                </div>
                
                <div id="auth-error" class="text-white bg-red-600 p-2 rounded-md text-sm font-bold text-center hidden"></div>
                <div id="auth-success" class="text-white bg-[#009c3b] p-2 rounded-md text-sm font-bold text-center hidden"></div>
                
                <div class="flex gap-3 mt-4">
                    <button type="submit" onclick="authMode = 'login'" class="flex-1 bg-[#009c3b] hover:bg-[#008231] text-white font-black py-3 rounded-lg transition shadow-md border-b-4 border-[#006A28] active:border-b-0 active:translate-y-1">ENTRAR</button>
                    <button type="submit" onclick="authMode = 'register'" class="flex-1 bg-[#002776] hover:bg-[#001A52] text-white font-black py-3 rounded-lg transition shadow-md border-b-4 border-[#001240] active:border-b-0 active:translate-y-1">CADASTRAR</button>
                </div>
            </form>
        </div>
    </main>

    <!-- VIEW: MAIN APP (ALBUM) -->
    <div id="view-app" class="hidden w-full flex-grow max-w-6xl mx-auto px-2 sm:px-4 py-2 sm:py-4 print-hide">
        <div class="bg-white rounded-xl shadow-2xl p-3 sm:p-5 mb-4 border border-white/40">
        <!-- Dashboard -->
        <header class="w-full print-hide mt-1 sm:mt-2">
            <div class="glass-panel bg-white p-6 rounded-xl flex flex-col md:flex-row gap-8 items-center justify-between border border-slate-200">
                <div class="w-full md:w-1/2">
                    <h2 class="text-lg font-semibold mb-3 text-slate-800">Meu Progresso</h2>
                    <div class="w-full bg-slate-100 rounded-full h-3 mb-2 overflow-hidden shadow-inner border border-slate-200">
                        <div id="progress-bar" class="bg-[#009c3b] h-3 rounded-full transition-all duration-700 w-0"></div>
                    </div>
                    <p class="text-sm text-slate-500 font-medium"><span id="total-obtained" class="text-slate-800">0</span> de <span id="total-stickers">980</span> coladas (<span id="progress-percent" class="text-[#009c3b] font-bold">0</span>%)</p>
                </div>
                
                <div class="flex gap-2 w-full md:w-auto justify-between md:justify-end flex-wrap sm:flex-nowrap">
                    <div class="text-center bg-slate-50 px-3 py-2 sm:px-4 sm:py-3 rounded-lg border border-slate-200 shadow-sm flex-1 min-w-[30%]">
                        <p class="text-xl sm:text-2xl font-bold text-[#009c3b]" id="stat-obtained">0</p>
                        <p class="text-[10px] sm:text-xs text-slate-500 font-semibold mt-1">Únicas</p>
                    </div>
                    <div class="text-center bg-slate-50 px-3 py-2 sm:px-4 sm:py-3 rounded-lg border border-slate-200 shadow-sm flex-1 min-w-[30%]">
                        <p class="text-xl sm:text-2xl font-bold text-slate-800" id="stat-missing">0</p>
                        <p class="text-[10px] sm:text-xs text-slate-500 font-semibold mt-1">Faltam</p>
                    </div>
                    <div class="text-center bg-slate-50 px-3 py-2 sm:px-4 sm:py-3 rounded-lg border border-slate-200 shadow-sm flex-1 min-w-[30%]">
                        <p class="text-xl sm:text-2xl font-bold text-[#009c3b]" id="stat-duplicates">0</p>
                        <p class="text-[10px] sm:text-xs text-slate-500 font-semibold mt-1">Repetidas</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Filtros e Abas -->
        <div class="w-full mt-4 sm:mt-6 print-hide">
            
            <!-- Barra de Pesquisa de Países -->
            <div class="mb-4 relative z-40">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="text-slate-400">🔍</span>
                    </div>
                    <input type="text" id="country-search" autocomplete="off" placeholder="Pesquisar país (ex: Brasil, Argentina)..." class="w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-300 rounded-lg text-slate-800 font-bold focus:outline-none focus:border-[#002776] shadow-sm">
                    <button id="clear-search" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-red-500 hidden">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div id="country-suggestions" class="absolute w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg hidden max-h-60 overflow-y-auto z-50">
                    <!-- Sugestões geradas via JS -->
                </div>
            </div>
            
            <!-- Mobile Selects -->
            <div class="flex flex-col gap-4 mb-6 sm:hidden bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 flex items-center gap-1"><span>🔍</span> Mostrar</label>
                    <select id="mobile-filter-select" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-slate-800 font-bold focus:outline-none focus:border-[#002776] shadow-inner">
                        <option value="all">Todas as Figurinhas</option>
                        <option value="missing">Somente Faltantes</option>
                        <option value="duplicates">Somente Repetidas</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 flex items-center gap-1"><span>📖</span> Sessão do Álbum</label>
                    <select id="mobile-tab-select" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-slate-800 font-bold focus:outline-none focus:border-[#002776] shadow-inner">
                        <!-- Gerado via JS -->
                    </select>
                </div>
            </div>

            <!-- Desktop Buttons -->
            <div class="hidden sm:flex gap-2 mb-6 bg-slate-100 p-1.5 rounded-lg border border-slate-200 w-fit">
                <button class="filter-btn active px-5 py-2 rounded-md bg-[#002776] text-white font-bold shadow-sm transition-colors whitespace-nowrap" data-filter="all">Todas as Figurinhas</button>
                <button class="filter-btn px-5 py-2 rounded-md bg-transparent text-slate-600 font-bold hover:bg-slate-200 transition-colors whitespace-nowrap" data-filter="missing">Faltantes</button>
                <button class="filter-btn px-5 py-2 rounded-md bg-transparent text-slate-600 font-bold hover:bg-slate-200 transition-colors whitespace-nowrap" data-filter="duplicates">Repetidas</button>
            </div>

            <div class="hidden sm:block relative mb-6">
                <div id="tabs-container" class="flex gap-2 flex-wrap pb-1">
                    <!-- Abas geradas via JS -->
                </div>
            </div>
        </div>

        <main class="w-full mt-4 pb-2" id="app-grid"></main>
        </div>
    </div>

    <!-- VIEW: ADMIN DASHBOARD -->
    <div id="view-admin" class="hidden w-full flex-grow max-w-6xl mx-auto p-4 mt-6 print-hide">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold text-white">Painel de Administração</h2>
            <button id="btn-voltar-album" onclick="showScreen('app')" class="bg-[#002776] hover:bg-[#001A52] text-white px-4 py-2 rounded text-sm font-medium">Voltar ao Álbum</button>
        </div>
        
        <div class="glass-panel bg-white p-6 rounded-xl border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-200 text-slate-500">
                            <th class="py-3 px-4">ID</th>
                            <th class="py-3 px-4">Usuário</th>
                            <th class="py-3 px-4 text-center">Figurinhas</th>
                            <th class="py-3 px-4 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="admin-users-table">
                        <!-- Gerado via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL: CHANGE PASSWORD -->
    <div id="modal-password" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] hidden">
        <div class="glass-panel bg-white p-6 rounded-xl w-full max-w-sm border border-slate-200">
            <h3 class="text-xl font-bold mb-4">Trocar Senha</h3>
            <div class="mb-4">
                <input type="password" id="new-password" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-slate-800" placeholder="Nova senha (mín 8 chars)">
            </div>
            <div id="pw-msg" class="text-sm mb-4 font-medium"></div>
            <div class="flex justify-end gap-2">
                <button onclick="document.getElementById('modal-password').classList.add('hidden')" class="px-4 py-2 rounded bg-slate-200 hover:bg-slate-300 text-slate-800 text-sm">Cancelar</button>
                <button onclick="submitChangePassword()" class="px-4 py-2 rounded bg-[#009c3b] hover:bg-[#008231] text-white text-sm">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Area de Impressão -->
    <div class="print-only hidden p-4">
        <h1 class="text-2xl font-bold mb-4" id="print-title">Checklist para Troca - Copa 2026</h1>
        <div id="print-content" class="text-sm"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
